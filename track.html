<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order — Nutribuy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body class="overflow-x-hidden bg-[#fafafa] font-sans text-[#2f2f2f] antialiased" data-page="track">
  <div id="site-header"></div>
  <main>
    <section class="page-hero border-b border-brand/10 px-4 py-10 sm:px-6 sm:py-14 lg:px-8">
      <div class="mx-auto max-w-xl text-center">
        <span class="section-badge inline-block rounded-full bg-brand/10 px-4 py-1.5 text-[11px] font-bold tracking-[1.76px] text-brand"><i class="fa-solid fa-star"></i> ORDER TRACKING</span>
        <h1 class="mt-4 text-3xl font-extrabold tracking-tight sm:text-4xl">Track Your Order</h1>
        <p class="mt-4 text-sm text-[#6a7282] sm:text-base">Enter your order ID and email to see delivery status.</p>
      </div>
    </section>
    <section class="px-4 py-10 sm:px-6 sm:py-12 lg:px-8">
      <form class="mx-auto max-w-md space-y-4 rounded-2xl bg-white p-6 shadow-card sm:p-8" onsubmit="return false;">
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Order ID</label>
          <input type="text" placeholder="e.g. NB-123456" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" />
        </div>
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Email</label>
          <input type="email" placeholder="you@email.com" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" />
        </div>
        <button type="submit" class="btn-gradient flex w-full items-center justify-center gap-2 rounded-2xl py-3.5 text-sm font-bold text-white"><i class="fa-solid fa-location-dot"></i> Track Order</button>
      </form>
    </section>
  </main>
  <footer id="contact" class="site-footer"></footer>
  <script src="js/layout.js"></script>
</body>
</html>
