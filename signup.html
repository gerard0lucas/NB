<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Nutribuy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script><script src="js/tailwind-config.js"></script><link rel="stylesheet" href="css/theme.css" />
</head>
<body class="overflow-x-hidden bg-[#fafafa] font-sans text-[#2f2f2f] antialiased" data-page="signup">
  <div id="site-header"></div>
  <main class="page-hero min-h-[70vh] px-4 py-10 sm:px-6 sm:py-16 lg:px-8">
    <div class="mx-auto grid max-w-5xl items-center gap-10 lg:grid-cols-2">
      <div class="text-center lg:text-left">
        <span class="section-badge inline-block rounded-full bg-brand/10 px-4 py-1.5 text-[11px] font-bold tracking-[1.76px] text-brand"><i class="fa-solid fa-star"></i> JOIN NUTRIBUY</span>
        <h1 class="mt-4 text-3xl font-extrabold sm:text-4xl">Create Your Account</h1>
        <p class="mt-4 text-sm text-[#6a7282] sm:text-base">Track orders, save favourites, and get exclusive wellness offers.</p>
        <ul class="mt-6 space-y-3 text-left text-sm text-[#4a5565] hidden sm:block">
          <li class="flex items-center gap-2"><span class="flex h-6 w-6 items-center justify-center rounded-full bg-mint text-mint-dark text-xs"><i class="fa-solid fa-check"></i></span> Free shipping on first order</li>
          <li class="flex items-center gap-2"><span class="flex h-6 w-6 items-center justify-center rounded-full bg-mint text-mint-dark text-xs"><i class="fa-solid fa-check"></i></span> Early access to new flavours</li>
          <li class="flex items-center gap-2"><span class="flex h-6 w-6 items-center justify-center rounded-full bg-mint text-mint-dark text-xs"><i class="fa-solid fa-check"></i></span> Wellness tips in your inbox</li>
        </ul>
      </div>
      <div class="rounded-2xl bg-white p-6 shadow-card sm:p-8">
        <form class="space-y-4" onsubmit="return false;">
          <div><label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Full Name</label><input type="text" placeholder="Your name" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" /></div>
          <div><label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Email</label><input type="email" placeholder="you@email.com" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" /></div>
          <div><label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Phone</label><input type="tel" placeholder="+91 00000 00000" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" /></div>
          <div><label class="mb-1.5 block text-xs font-semibold text-[#4a5565]">Password</label><input type="password" placeholder="Create a password" class="w-full rounded-2xl border border-brand/15 px-4 py-3 text-sm focus:border-brand focus:outline-none" /></div>
          <label class="flex items-start gap-2 text-xs text-[#6a7282]"><input type="checkbox" class="mt-0.5 rounded border-brand/30 text-brand" /> I agree to the <a href="#" class="text-brand font-semibold">Terms &amp; Conditions</a> and <a href="#" class="text-brand font-semibold">Privacy Policy</a></label>
          <button type="submit" class="btn-gradient w-full rounded-2xl py-3.5 text-sm font-bold text-white">Create Account</button>
        </form>
        <p class="mt-6 text-center text-sm text-[#6a7282]">Already have an account? <a href="signup.html" class="font-semibold text-brand">Sign In</a></p>
      </div>
    </div>
  </main>
  <footer id="contact" class="site-footer"></footer>
  <script src="js/layout.js"></script>
</body>
</html>
