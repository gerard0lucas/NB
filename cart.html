<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Nutribuy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script><script src="js/tailwind-config.js"></script><link rel="stylesheet" href="css/theme.css" />
</head>
<body class="overflow-x-hidden bg-[#fafafa] font-sans text-[#2f2f2f] antialiased" data-page="cart">
  <div id="site-header"></div>
  <main>
    <section class="page-hero border-b border-brand/10 px-4 py-10 sm:py-14 lg:px-8"><div class="mx-auto max-w-7xl"><h1 class="text-3xl font-extrabold sm:text-4xl">Your Cart</h1><p class="mt-2 text-sm text-[#6a7282]">2 items · Review before checkout</p></div></section>
    <section class="px-4 py-10 sm:px-6 lg:px-8"><div class="mx-auto max-w-7xl grid gap-8 lg:grid-cols-3">
      <div class="space-y-4 lg:col-span-2">
        <div class="flex gap-4 rounded-2xl bg-white p-4 shadow-card sm:p-6">
          <a href="product-daily-sip.html"><img src="assets/hero-refreshica.png" alt="Daily Sip" class="h-24 w-24 shrink-0 rounded-xl object-cover sm:h-28 sm:w-28" /></a>
          <div class="flex flex-1 flex-col justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-brand-dark">Daily Wellness</p><h2 class="font-bold"><a href="product-daily-sip.html" class="hover:text-brand">Daily Sip</a></h2><p class="mt-1 text-sm text-[#99a1af]">₹299 each · 15 sachets</p></div><div class="mt-3 flex items-center justify-between"><div class="flex items-center gap-3 rounded-xl border border-brand/15 px-3 py-1.5"><button class="text-brand font-bold">−</button><span class="text-sm font-semibold">1</span><button class="text-brand font-bold">+</button></div><p class="text-lg font-extrabold text-brand">₹299</p></div></div>
        </div>
        <div class="flex gap-4 rounded-2xl bg-white p-4 shadow-card sm:p-6">
          <a href="product-refreshica.html"><img src="assets/hero-refreshica.png" alt="Hydration Refreshica" class="h-24 w-24 shrink-0 rounded-xl object-cover sm:h-28 sm:w-28" /></a>
          <div class="flex flex-1 flex-col justify-between"><div><p class="text-[10px] font-bold uppercase tracking-widest text-mint-dark">Hydration</p><h2 class="font-bold"><a href="product-refreshica.html" class="hover:text-brand">Hydration Refreshica</a></h2><p class="mt-1 text-sm text-[#99a1af]">₹349 each · 15 sachets</p></div><div class="mt-3 flex items-center justify-between"><div class="flex items-center gap-3 rounded-xl border border-brand/15 px-3 py-1.5"><button class="text-brand font-bold">−</button><span class="text-sm font-semibold">1</span><button class="text-brand font-bold">+</button></div><p class="text-lg font-extrabold text-brand">₹349</p></div></div>
        </div>
        <a href="shop.html" class="inline-flex items-center gap-1.5 text-sm font-semibold text-brand hover:underline"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
      </div>
      <div class="h-fit rounded-2xl bg-white p-6 shadow-card">
        <h2 class="text-lg font-bold">Order Summary</h2>
        <dl class="mt-4 space-y-3 text-sm"><div class="flex justify-between"><dt class="text-[#6a7282]">Subtotal</dt><dd class="font-semibold">₹648</dd></div><div class="flex justify-between"><dt class="text-[#6a7282]">Shipping</dt><dd class="font-semibold text-mint-dark">Free</dd></div><div class="flex justify-between border-t border-brand/10 pt-3 text-base"><dt class="font-bold">Total</dt><dd class="font-extrabold text-brand">₹648</dd></div></dl>
        <button class="btn-gradient mt-6 flex w-full items-center justify-center gap-2 rounded-2xl py-4 text-sm font-bold text-white"><i class="fa-solid fa-lock"></i>Proceed to Checkout</button>
        <p class="mt-4 text-center text-[11px] text-[#99a1af]">Secure checkout · Free shipping over ₹499</p>
      </div>
    </div></section>
  </main>
  <footer id="contact" class="site-footer"></footer>
  <script src="js/layout.js"></script>
</body>
</html>
